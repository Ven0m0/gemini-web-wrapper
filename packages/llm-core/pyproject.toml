[project]
name = "affine-llm-core"
version = "0.1.0"
description = "Affine LLM core provider abstraction layer"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    { name = "Affine AI", email = "ai@affine.pro" },
]
keywords = ["llm", "ai", "gemini", "anthropic", "copilot"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "pydantic>=2.5.0",
    "httpx>=0.25.0",
    "affine-shared @ file:///workspace/3fa973b4-834e-4f9f-bb84-4461709c8875/sessions/agent_5acddefb-219f-4dc5-887d-277158eef38e/packages/shared",
]

[project.optional-dependencies]
google-genai = [
    "google-genai>=0.3.0",
]
gemini-webapi = [
    "gemini-webapi>=0.2.0",
    "rookiepy>=0.2.0",
]
anthropic = [
    "anthropic>=0.18.0",
]
copilot = [
    "openai>=1.12.0",
]
bifrost = [
    "openai>=1.12.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-anyio>=0.9.0",
    "ruff>=0.3.0",
    "pyrefly>=0.0.17",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.affine]
package-name = "affine.llm_core"
