[project]
name = "affine-code-index"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "lancedb>=0.21.0",
    "tree-sitter>=0.25.2",
    "tree-sitter-python>=0.25.0",
    "tree-sitter-rust>=0.24.2",
    "tree-sitter-bash>=0.25.1",
    "tree-sitter-typescript>=0.23.0",
    "tree-sitter-javascript>=0.23.0",
    "ast-grep-py>=0.42.1",
    "numpy>=1.24.0",
    "pydantic>=2.0.0",
    "httpx>=0.24.0",
    "affine-config",
    "affine-llm-core",
    "voyageai>=0.3.7",
]

[project.optional-dependencies]
local-embeddings = [
    "sentence-transformers>=2.2.0",
]

[dependency-groups]
dev = [
    "ruff>=0.6.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=7.1.0",
]

[tool.uv.sources]
affine-config = { workspace = true }
affine-llm-core = { workspace = true }
