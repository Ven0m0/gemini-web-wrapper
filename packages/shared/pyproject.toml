[project]
name = "@affine/shared"
version = "1.0.0"
description = "Affine AI Coding Workstation - Shared types and utilities"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "orjson",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/affine/shared"]
