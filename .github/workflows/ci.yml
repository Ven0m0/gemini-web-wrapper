# See https://github.com/astral-sh/uv-action
name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  web:
    name: Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install
        working-directory: apps/web
      - run: bun run lint
        working-directory: apps/web
      - run: bun run typecheck
        working-directory: apps/web
      - run: bun run build
        working-directory: apps/web

  api:
    name: API (lint, typecheck, test)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src:../../packages/config/src
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"
      - uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true
      - run: uv sync --all-extras
        working-directory: apps/api
      - run: uv run ruff format --check
        working-directory: apps/api
      - run: uv run ruff check
        working-directory: apps/api
      - name: Write pyrefly config
        run: |
          cat > pyrefly.toml <<'EOF'
          python-version = "3.14"
          project-includes = ["src"]
          search-path = [
              "src",
              "../../packages/config/src",
              "../../packages/llm-core/src",
              "../../packages/shared/python/src",
          ]
          [errors]
          missing-import = false
          bad-return = false
          EOF
        working-directory: apps/api
      - run: uv run pyrefly check
        working-directory: apps/api
      - run: uv run pytest
        working-directory: apps/api

  config:
    name: Config package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"
      - uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true
      - run: uv sync
        working-directory: packages/config
      - run: uv run ruff format --check src/
        working-directory: packages/config
      - run: uv run ruff check src/
        working-directory: packages/config

  shared:
    name: Shared package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"
      - uses: astral-sh/setup-uv@v8.3.1
        with:
          enable-cache: true
      - run: uv sync
        working-directory: packages/shared/python
      - run: uv run ruff format --check src/
        working-directory: packages/shared/python
      - run: uv run ruff check src/
        working-directory: packages/shared/python
