name: Copilot Setup Steps
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - mise.toml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - mise.toml
permissions:
  contents: read
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true
      - name: Install Bun workspace dependencies
        run: bun install --frozen-lockfile
      - name: Install uv workspace dependencies
        run: uv sync --all-extras --all-packages --all-groups --frozen
