name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24.18.0"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install frontend dependencies
        run: bun install
        working-directory: apps/web

      - name: Validate frontend
        run: |
          bun run test
          bun run lint
          bun run typecheck
          bun run build
        working-directory: apps/web

      - name: Package web release asset
        run: |
          test -d apps/web/dist || { echo "Build directory not found"; exit 1; }
          test -n "$(find apps/web/dist -mindepth 1 -print -quit)" || { echo "Build directory is empty"; exit 1; }
          tar -czf "gemini-web-wrapper-web-${{ github.ref_name }}.tar.gz" -C apps/web dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            "gemini-web-wrapper-web-${{ github.ref_name }}.tar.gz"
