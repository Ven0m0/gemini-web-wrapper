name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install frontend dependencies
        run: bun install
        working-directory: apps/web

      - name: Validate frontend
        run: |
          bun run test
          bun run lint
          bun run typecheck
          bun run build
        working-directory: apps/web

      - name: Package web release asset
        run: |
          tar -czf "gemini-web-wrapper-web-${{ github.ref_name }}.tar.gz" -C apps/web dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            "gemini-web-wrapper-web-${{ github.ref_name }}.tar.gz"
